app = "alertnow-usermanual"          # Change this to your desired app name (lowercase, no spaces)
primary_region = "sin"               # Singapore region (closest & lowest latency for Philippines)

[build]
  builder = "paketobuildpacks/builder:base"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[env]
  PORT = "8080"

[mounts]
  source = "database"
  destination = "/app/database"